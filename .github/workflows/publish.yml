# =============================================================================
# GitHub Actions 发布工作流
# =============================================================================
# 这个工作流会在以下情况触发：
# 1. 创建 GitHub Release
# 2. 手动触发（workflow_dispatch）
#
# 执行内容：
# - 构建包
# - 发布到 PyPI
# - 创建 GitHub Release（如果不存在）
# =============================================================================

name: Publish to PyPI

on:
  # 当创建 Release 时触发
  release:
    types: [published]
  # 允许手动触发
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  # ---------------------------------------------------------------------------
  # 发布任务
  # ---------------------------------------------------------------------------
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    # 权限配置：允许创建 Release
    permissions:
      contents: write
      id-token: write  # 用于 PyPI trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # 构建源码包 (sdist) 和 wheel
      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      # ---------------------------------------------------------------------------
      # 发布到 TestPyPI（测试环境）
      # 用于验证发布流程是否正确，不会影响正式包
      # ---------------------------------------------------------------------------
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # 如果版本已存在则跳过

      # ---------------------------------------------------------------------------
      # 发布到 PyPI（正式环境）
      # 使用 Trusted Publishing，无需配置 token
      # ---------------------------------------------------------------------------
      - name: Publish to PyPI
        if: |
          (github.event_name == 'release' && github.event.release.prerelease == false) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1

      # ---------------------------------------------------------------------------
      # 发布成功通知（可选）
      # ---------------------------------------------------------------------------
      - name: Get version
        if: success()
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Summary
        if: success()
        run: |
          echo "## Published Successfully! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install marmot==${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
